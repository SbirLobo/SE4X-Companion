# Space Empires 4X — Game Options & Variants
# ©2024 GMT Games, LLC
#
# Rulebook abbreviations:
#   SE4X 1 VO  = Space Empires 4X base game Rule Book
#   SE4X 1 SB  = Space Empires 4X base game Scenario Book
#   SE4X 2 VO  = Close Encounters Rule Book
#   SE4X 2 SB  = Close Encounters Scenario Book
#   SE4X 3 VO  = Replicators Rule Book
#   AGT MRB    = All Good Things Master Rule Book v8 (consolidates all rules)
#   AGT CSB    = All Good Things Competitive Scenario Book
#   AGT SSB    = All Good Things Solo/Co-op Scenario Book v9
#
# Fields:
#   ref: where to find this rule — list of "book page" or "book section" entries
#   category: rule grouping
#       "extension"             — rules adding new components (cards, units)
#       "advanced"              — major gameplay modules
#       "optional"              — rules changing game pace or flavor
#       "additional_terrain"    — sub-options of Additional Terrain (AGT MRB 25.0)
#       "advanced_construction" — sub-options of Advanced Construction (AGT MRB 38.0)
#       "facility"              — sub-options of Facilities (AGT MRB 36.0)
#       "variant"               — lightweight gameplay tweaks
#       "deprecated"            — old variants absent from AGT documents (kept for reference)
#   default: whether this option is typically used (author recommendation)
#   requires: list of option keys that must be enabled first
#   incompatible: list of option keys that cannot be used together
#   source: expansion that introduced this option
#       "base" — Space Empires 4X (SE4X 1)
#       "ce"   — Close Encounters (SE4X 2)
#       "r"    — Replicators (SE4X 3)
#       "agt"  — All Good Things

# =============================================================================
# EXTENSION RULES
# =============================================================================

[empire_advantages_random]
name = "Empire Advantages — Random Method"
ref = ["AGT MRB 10.1 p.14", "SE4X 2 VO 13.0 p.6"]
category = "extension"
default = true
source = "ce"
incompatible = ["empire_advantages_balanced"]
description = "Each player is dealt 2 Empire Advantage cards at the start of the game and keeps 1 (the other is discarded face down). A Replicator player (40.0) receives 2 Replicator Empire Advantage cards instead. Cards are placed face down and revealed when their condition is met. Do not use an advantage if not playing with the rule it modifies."

[empire_advantages_balanced]
name = "Empire Advantages — Balanced Method"
ref = ["AGT MRB 10.2 p.14", "SE4X 2 VO 13.0 p.6"]
category = "extension"
default = false
source = "ce"
incompatible = ["empire_advantages_random", "replicators"]
description = "One more Empire Advantage card than the number of players is dealt face up. Each player starts with 75 CP. Open CP bidding begins for each card in turn until no one is willing to beat the highest bid. The winner subtracts their bid from starting CP and picks the card. When one player remains, they choose from the two remaining cards."

[alien_technology_cards]
name = "Alien Technology Cards"
ref = ["AGT MRB 11.0 p.14", "SE4X 2 VO 12.0 p.6"]
category = "extension"
default = true
source = "ce"
description = "When a player colonizes or captures a Deep Space barren planet, they may draw 2 Alien Technology cards. If a card does not apply to their empire, it may be revealed and discarded for a different one. The player must pay 10 CP next Economic Phase to keep a chosen card, otherwise it is discarded. With Non-Player Aliens (18.0), there is no cost. Cards are placed face down and revealed when their condition is met."

[crew_cards]
name = "Crew Cards"
ref = ["AGT MRB 12.0 p.15"]
category = "extension"
default = false
source = "agt"
description = "Every even-numbered Economic Phase (2, 4, 6...), each player draws 2 Crew Cards, keeps 1, discards the other face down. Crew Cards are assigned to Groups during the same Economic Phase, providing unique combat bonuses. Each player may have up to 5 Crew Cards in play. Can be used in addition to or separately from Ship Experience (37.0); if used together, bonuses are cumulative."

[merchant_ship_pipelines]
name = "Merchant Ship Pipelines"
ref = ["AGT MRB 13.0 p.15", "SE4X 1 VO 10.0 p.11"]
category = "extension"
default = true
source = "base"
description = "MS Pipelines are non-combat ships forming trade networks. They move 1 hex per turn and cost no maintenance. Trade Networks: any Colony connected to the Homeworld by an unbroken chain of MS Pipelines produces +1 CP per Economic Phase. Movement Bonus: any unit starting its movement on a friendly MS Pipeline chain may move 1 additional hex along the chain. MS Pipelines survive Black Holes and allow ships to ignore Nebulae and Asteroids for movement purposes along the chain."

[defense_satellite_networks]
name = "Defense Satellite Networks"
ref = ["AGT MRB 14.0 p.16"]
category = "extension"
default = false
source = "agt"
description = "DSNs are stationary defense units (B4-1-x2) built at any friendly Colony with income (not new or blockaded). Requires Ship Size 2 technology. DSNs cannot move, cost no maintenance, and are not built by Shipyards. Each Colony is limited to 1 DSN and 1 Base/Starbase per hex. DSNs participate in combat like other Groups but may not retreat and cannot be boarded."

# =============================================================================
# ADVANCED RULES
# =============================================================================

[carriers_fighters_point_defense]
name = "Carriers, Fighters & Point Defense"
ref = ["AGT MRB 15.0 p.16", "SE4X 1 VO 11.0 p.11"]
category = "advanced"
default = true
source = "base"
description = "Carriers (CV) hold up to 3 Fighter Squadrons. Carriers participate in combat but cannot be targeted until all their Fighters are destroyed (even if the CV is screened). Fighters are purchased in squadrons, cannot move on their own, and can transfer between ships/planets. Fighter tech improves their Attack and Defense. Point Defense is a Scout-only technology giving them A-Class rating and higher Attack vs. Fighters only; vs. other ships they fire at normal E-Class. Fighters at level 2-3 get +1 Defense against PD."

[raiders_cloaking_scanners]
name = "Raiders: Cloaking & Scanners"
ref = ["AGT MRB 16.0 p.17", "SE4X 1 VO 12.0 p.12"]
category = "advanced"
default = true
source = "base"
description = "Cloaking (levels 1-2) allows Raiders to move through occupied hexes without stopping or triggering combat, occupy hexes without blockading, and retreat before combat starts. In combat, cloaked Raiders fire at A-Class with +1 Attack on the first round. Scanners (levels 1-2) on Destroyers (and Advanced Bases) detect Raiders of equal or lower Cloaking level, negating cloak advantages. Cloaking does not work in Nebulae."

[mines_minesweepers]
name = "Mines & Minesweepers"
ref = ["AGT MRB 17.0 p.18", "SE4X 1 VO 13.0 p.13"]
category = "advanced"
default = true
source = "base"
description = "Mines are placed at any friendly-occupied hex (including enemy Colonies). They move 1 hex max, cost no maintenance, and detonate automatically when enemy ships enter, destroying one ship each (regardless of Hull Size). Mines must detonate and cannot choose targets. Minesweepers (levels 1-3) remove 1/2/3 Mines each before detonation. Mines only work on cloaked Raiders if a Destroyer with appropriate Scanner is present."

[aliens_npa]
name = "Aliens (Non-Player Aliens)"
ref = ["AGT MRB 18.0 p.18", "SE4X 1 VO 14.0 p.13"]
category = "advanced"
default = true
source = "base"
description = "When a Deep Space barren planet is revealed, random NPA ships are drawn and placed on it (4 ships, or per Planet Attribute if using 26.0). NPAs have Tactics 1, Security Forces 1, and attack any ship entering their hex. Hull Size 2 NPAs have Scanner 1 and PD 1. NPAs never leave their hex or retreat. A planet is conquered when its last NPA ship is destroyed. The first non-team player to the active player's left controls the NPAs in combat."

[boarding_capturing_ships]
name = "Boarding & Capturing Ships"
ref = ["AGT MRB 19.0 p.19", "SE4X 2 VO 4.0 p.3"]
category = "advanced"
default = true
source = "ce"
description = "Boarding Ships (BD) can capture enemy ships. The attack compares the BD's Attack Strength vs. the target's Hull Size (ignoring most tech modifiers, except Experience and Security Forces). If the roll succeeds, the ship is immediately captured. BDs always hit on 1, fire as F-Class in terrain, and may not mount Attack tech. Carriers, Bases, Starbases, DSNs, Titans, DMs, Colonies, Amoebas, and Replicator ships cannot be captured. Captured ships can be scrapped to steal one level of technology per ship."

[security_forces]
name = "Security Forces"
ref = ["AGT MRB 20.0 p.20", "SE4X 2 VO 5.0 p.4"]
category = "advanced"
default = true
source = "ce"
requires = ["boarding_capturing_ships"]
description = "Defensive technology against Boarding Ships. Security Forces 1 gives all ships +1 Hull Size when targeted by a boarding attack (making capture harder). Security Forces 2 doubles this to +2. All NPA ships (18.0) are equipped with Security Forces 1. The bonus is automatic and does not require upgrading existing ships."

[transports_ground_combat]
name = "Transports & Ground Combat"
ref = ["AGT MRB 21.0 p.20", "SE4X 2 VO 14.0 p.7"]
category = "advanced"
default = true
source = "ce"
description = "Transports carry up to 6 Ground Units (Infantry, Space Marines, Heavy Infantry, Militia, Grav Armor, Cyber Armor). Ground Units take and defend Colonies via planetary invasion after winning space combat. Colonies receive free Militia (1 per CP) when invaded. Ground Combat 2 unlocks Space Marines and Heavy Infantry. Ground Combat 3 unlocks Grav Armor (support ability) and upgrades Transports to Drop Ships (Defense 2, first-round landing). Bombardment from space can reduce Colonies before landing."

[titans]
name = "Titans"
ref = ["AGT MRB 22.0 p.23", "SE4X 2 VO 6.0 p.5"]
category = "advanced"
default = true
source = "ce"
description = "Massive warships requiring Ship Size 7 technology. Each hit from a Titan does 2 damage to a single ship (1 attack per round). Titans may never be screened (due to size) or retreat from combat. They are immune to boarding. Fighters get +1 Attack Strength vs. Titans. Mines do 1 damage each (5 Mines needed to kill a Titan). Titans can carry 3 Fighters like Carriers when Fighter tech is researched. Titans destroy Colonies and planets on bombardment."

[flagships]
name = "Flagships"
ref = ["AGT MRB 23.0 p.24", "SE4X 2 VO 16.0 p.9"]
category = "advanced"
default = true
source = "ce"
description = "Each player begins with one named Flagship (Enterprise, Victory, Thunder Child, Argo, Fearless, or Eagle). Counts as Hull Size 3 for upgrading and damage. Pays no maintenance. May carry Exploration 1 and Fast 1 once researched. Technology upgraded normally. Can gain Experience. If destroyed, it can never be rebuilt. If captured, the capturing player may use it. With Alternate Empires (24.0), Flagships gain random special abilities like BCs/BBs/DNs."

[alternate_empires]
name = "Alternate Empires"
ref = ["AGT MRB 24.0 p.24"]
category = "advanced"
default = false
source = "agt"
description = "Up to 2 players use empires with alternate ship costs, abilities, and a new unit type: Missile Boats. Missile Boats fire one Missile per round at A-Class (early in combat), doing 2 damage to ships or 1 to Titans. Alternate Empires cannot build Titans (except War Sun advantage) or CVs/BVs. Their Fighters do not need carrying ships and function as combat-capable units. Jammer technology on Cruisers counters Missiles. At Ship Size 4/AC 1, BCs/BBs/DNs draw a random special ability."

[additional_terrain]
name = "Additional Terrain"
ref = ["AGT MRB 25.0 p.26", "SE4X 3 VO 3.0 p.4"]
category = "advanced"
default = false
source = "r"
description = "Umbrella option adding new terrain types to the Deep Space System markers. Enable specific terrain types below (Cosmic Storms, Folds in Space, Space Stations, Pulsars, Quantum Filaments, Regional Maps, Space Pirates, Quasars). Terrain tiles replace some standard System markers during setup. Each sub-option adds its own counters and rules."

[deep_space_planet_attributes]
name = "Deep Space Planet Attributes"
ref = ["AGT MRB 26.0 p.28"]
category = "advanced"
default = false
source = "agt"
requires = ["aliens_npa"]
description = "Each Deep Space barren planet gets an Attribute counter (drawn when the planet is flipped) specifying the number of NPA ships and Heavy Infantry defending it. Requires Non-Player Aliens (18.0). Adds 20 new NPA counters (A5-1-x2 or E7-1-x2) to the supply. Hull Size 2 NPAs get Scanner 1. Planets scanned with Exploration tech (9.8) have their counter returned face down without being drawn."

[scenario_modifier_cards]
name = "Scenario Modifier Cards"
ref = ["AGT MRB 27.0 p.28"]
category = "advanced"
default = false
source = "agt"
description = "At setup, 2 Scenario Modifier Cards are randomly drawn (one at a time). If the second conflicts with the first, it is discarded and replaced. Both cards remain in effect for the entire game, changing rules or victory conditions. If used with Empire Advantages (10.0), the Scenario Modifiers are selected first."

# =============================================================================
# ADDITIONAL TERRAIN (sub-options of 25.0)
# =============================================================================

[cosmic_storms]
name = "Cosmic Storms"
ref = ["AGT MRB 25.1 p.26"]
category = "additional_terrain"
default = false
source = "agt"
requires = ["additional_terrain"]
description = "Two types: Plasma Storms and Ion Storms. Both move one hex at the end of each Economic Phase (roll a die: 1-6 moves, 7-10 stays). Plasma Storms destroy ships costing 9 CP or less, Space Wrecks, and Minerals on contact. Ion Storms double all combat damage inside them; leaving an Ion Storm requires a die roll (9-10 = stuck for the turn). Storms only enter empty Deep Space hexes (no Nebulae, Asteroids, etc.). Destroyed by Black Holes. Doomsday Machines unaffected."

[folds_in_space]
name = "Folds in Space"
ref = ["AGT MRB 25.2 p.27", "SE4X 3 VO 3.0 p.4"]
category = "additional_terrain"
default = true
source = "r"
requires = ["additional_terrain"]
description = "Permanent spatial shortcuts. Ships never stop in a Fold hex — they pass straight through without spending movement. A ship adjacent to a Fold is considered adjacent to all hexes on the other side. Exploration tech can scan through Folds. MS Pipelines can trace chains through Folds. If a Fold is explored and found adjacent to another revealed Fold, remove it from the game. A ship pushed into a Fold by a Lost in Space marker is returned to its entry hex."

[space_stations]
name = "Space Stations"
ref = ["AGT MRB 25.3 p.27"]
category = "additional_terrain"
default = false
source = "agt"
requires = ["additional_terrain"]
description = "Hostile automated platforms (A5-1-x1 or A6-2-x2) that do not move and must be defeated in combat. All Space Stations have Point Defense 2 and Scanner 1, and cannot be boarded. Reward for destruction depends on type: A6-2-x2 yields 2 free Alien Tech cards; A5-1-x1 yields 5 CP or 10 CP (if not using Alien Tech cards)."

[pulsars]
name = "Pulsars"
ref = ["AGT MRB 25.4 p.27"]
category = "additional_terrain"
default = false
source = "agt"
requires = ["additional_terrain"]
description = "Color-coded terrain (Blue, Red, Green). Ships that spend an entire turn not moving inside a Pulsar become Charged. Charged ships gain a bonus upon leaving: Blue = +1 Movement that turn, Red = +1 Attack Strength that turn, Green = +1 Defense Strength that turn. All friendly ships in a Pulsar must leave simultaneously at the slowest ship's speed. Ships may never retreat from battle in a Pulsar."

[quantum_filaments]
name = "Quantum Filaments"
ref = ["AGT MRB 25.5 p.27"]
category = "additional_terrain"
default = false
source = "agt"
requires = ["additional_terrain"]
description = "Extremely dense gravity fields. Ships must spend 1 additional hex of movement to enter. Ships that can only move 1 hex per turn cannot enter. Cloaking technology does not work inside a Quantum Filament. Boarding Ships may not perform boarding attacks inside. Fighters cannot be used in combat. Ships may retreat into a Quantum Filament or enter via Reaction Movement (35.0). Alternate Empire Fighters treat them as Super Novae."

[regional_maps]
name = "Regional Maps"
ref = ["AGT MRB 25.6 p.27", "SE4X 3 VO 3.0 p.4"]
category = "additional_terrain"
default = true
source = "r"
requires = ["additional_terrain"]
description = "When a ship explores a hex containing a Regional Map counter, the exploring player may look at all adjacent face-down System markers. They may reveal or leave them face down, just like using Exploration technology. If peeked at using Exploration tech or a Regional Map, the counter must be left face down until actually entered."

[space_pirates]
name = "Space Pirates"
ref = ["AGT MRB 25.7 p.28", "SE4X 3 VO 3.0 p.4"]
category = "additional_terrain"
default = true
source = "r"
requires = ["additional_terrain"]
description = "Interstellar nomads (A5-0-x1, Move 4, Fast 1, Tactics 0). When revealed, the player must fight or hire the Pirate. Hiring costs 10 CP (paid next Economic Phase). A hired Pirate is controlled by the player, moves at speed 4, stacks and defends with friendly ships but attacks alone. Self-destructs if captured. Cannot gain technology or Empire Advantages. No maintenance. One Pirate per player max. Removed if a DM reveals or approaches the Pirate."

[quasars]
name = "Quasars"
ref = ["AGT MRB 25.8 p.28"]
category = "additional_terrain"
default = false
source = "agt"
requires = ["additional_terrain"]
description = "In combat at a Quasar hex, the Defense Strength and Defense technology of all units are set to zero. This represents the unexplainable effects of the quasar's powerful radio waves on all combat systems."

# =============================================================================
# OPTIONAL RULES
# =============================================================================

[galactic_capitol]
name = "The Galactic Capitol"
ref = ["AGT MRB 28.1 p.28"]
category = "optional"
default = false
source = "r"
incompatible = ["replicators"]
description = "A neutral, highly developed planet placed in Deep Space. No combat ever takes place in this hex — both combat and non-combat ships may pass through. Players may trade with the Galactic Capitol by connecting their Homeworld via MS Pipelines, yielding 5 CP (not 1) per Economic Phase. Multiple empires may trade simultaneously. Replicators cannot gain RPs here since combat is forbidden. The Traders Empire Advantage earns 6 CP instead."

[warp_points]
name = "Warp Points"
ref = ["AGT MRB 28.2 p.29", "SE4X 1 VO 16.0 p.14"]
category = "optional"
default = true
source = "base"
description = "6 Warp Point markers (3 matching pairs) are mixed into the Deep Space System markers. Once a matching pair is discovered, they act as adjacent hexes for all purposes: movement, MS Pipeline chains, retreating. The third marker of the same number is discarded. A ship at a Warp Point may move to the matching Warp Point's System and continue as if the two Systems were adjacent. Reaction moves (35.0) may NOT be made through Warp Points."

[doomsday_machines]
name = "Doomsday Machines"
ref = ["AGT MRB 29.0 p.29", "SE4X 1 VO 17.0 p.14"]
category = "optional"
default = false
source = "base"
description = "1-3 DMs are mixed into Deep Space System markers (players agree on the number). A DM is C-Class, gets 2 attacks per round, Attack 9, Defense 2, Hull Size 3. DMs move each turn toward the nearest planet/asteroid/ship (up to 2 hexes). They destroy any Colony or planet they land on. In competitive play, DMs have Tactics 2 and Scanner 2; a roll of 1 counts as a hit. Mines detonate on DMs. DMs are immune to Fighters. Destroying a DM gives a double roll on the Space Wreck table."

[instant_technology_upgrade]
name = "Instant Technology Upgrade"
ref = ["AGT MRB 30.0 p.29", "SE4X 1 VO 15.1 p.14"]
category = "optional"
default = false
source = "base"
description = "When a player purchases a new technology level, all existing ships are instantly upgraded to that level at no extra cost. This removes the need to track which ships have which technology level. Simplifies bookkeeping but makes technology purchases more powerful since the entire fleet benefits immediately."

[black_hole_slingshot]
name = "Black Hole Slingshot"
ref = ["AGT MRB 31.0 p.30", "SE4X 1 VO 15.2 p.14"]
category = "optional"
default = true
source = "base"
description = "A ship entering a revealed Black Hole hex may declare a \"slingshot\" attempt before rolling for survival. The survival roll is modified by +2 (making destruction 20% more likely). If the ship survives, it gains +1 Movement for that turn only. This bonus cannot be combined with MS Pipeline movement benefits. The decision must be declared before the die is rolled."

[research_gearing_limits]
name = "Research Gearing Limits"
ref = ["AGT MRB 32.0 p.30", "SE4X 1 VO 18.0 p.15"]
category = "optional"
default = false
source = "base"
incompatible = ["facilities"]
description = "A player may only spend 10 more CP on research than they spent the previous turn. For example, if a player spent 15 CP on research, they may spend 0 to 25 next turn. If they spend 0, the following turn they can spend at most 10. This prevents empires from going from zero to massive research investment in a single turn, encouraging steady research spending."

[unpredictable_research]
name = "Unpredictable Research"
ref = ["AGT MRB 33.0 p.30", "SE4X 1 VO 19.0 p.15"]
category = "optional"
default = false
source = "base"
description = "Instead of purchasing technology directly, players spend CP in 5 CP grants, each allowing one die roll. For every 10 CP spent on a technology, roll two dice. Results are summed; if the total meets or exceeds the technology cost, it is acquired immediately. Otherwise, keep the running total and add to it next turn. Funding must be specific to each technology type (Tactics, Movement, Attack, etc.). Adds uncertainty to research."

[terraforming_nebulae]
name = "Terraforming Nebulae"
ref = ["AGT MRB 34.0 p.30", "SE4X 2 VO 18.0 p.10"]
category = "optional"
default = false
source = "ce"
incompatible = ["facilities", "replicators"]
description = "Terraforming 2 technology may be purchased after Terraforming 1. A Miner in a Nebula connected by an MS Pipeline chain to the Homeworld collects 5 CP per Economic Phase (one Miner per Nebula). The Miner must have been built with or upgraded to Terraforming 2. Income from Nebulae is not modified by Variants, Resource Cards, Empire Advantages, or Alien Technologies."

[reaction_movement]
name = "Reaction Movement"
ref = ["AGT MRB 35.0 p.31", "SE4X 2 VO 10.0 p.5"]
category = "optional"
default = false
source = "ce"
incompatible = ["replicators"]
description = "Requires Exploration 2 technology. After an opponent finishes moving, ships with the React ability in an adjacent hex may move 1 hex to join a battle before combat resolves. React ability is gained at: Move 3+ (SCs, DDs, CAs, Rs), Move 4+ (Flagships, BCs, BDs, MBs), Move 5+ (BBs, CVs, BVs, Unique Ships, Transports), Move 6+ (DNs, Minesweepers). Only 1 hex of reaction per player turn. Cannot react through Warp Points."

[facilities]
name = "Facilities (IC/RC/LC/TC)"
ref = ["AGT MRB 36.0 p.31"]
category = "optional"
default = false
source = "agt"
incompatible = ["terraforming_nebulae", "research_gearing_limits", "replicators"]
description = "Adds 4 types of Facilities built at Colonies for 5 CP each (no benefit the turn built). Homeworlds use 20 CP (not 30) and start with 1 RC and 1 LC (if playing with LCs). Each Colony supports 1 Facility; Homeworlds support 2. Facilities are destroyed when a Colony is eliminated or captured by Ground Units. Enable specific Facility types below (IC, RC, LC, TC). For a simpler game, players may agree to skip LCs and/or TCs."

[ship_experience]
name = "Ship Experience & Military Academies"
ref = ["AGT MRB 37.0 p.34", "SE4X 2 VO 3.0 p.2"]
category = "optional"
default = false
source = "ce"
incompatible = ["replicators"]
description = "5 Experience levels per Group: Green, Skilled, Veteran, Elite, Legendary. Experience is tracked per Group (not per ship). Groups gain Experience by destroying/capturing units (die roll ≤ 2× target Hull Size). Higher Experience gives +1 Attack vs. lower Experience Groups, and -1 Attack against Groups 2+ levels above. Groups 3+ levels above cannot be fired upon (except at the lowest Experienced target). Elite/ Legendary Groups pay half maintenance. Military Academies (levels 1-2) improve starting Experience of new ships."

[advanced_construction]
name = "Advanced Construction"
ref = ["AGT MRB 38.0 p.35", "SE4X 3 VO 4.0 p.5"]
category = "optional"
default = false
source = "r"
description = "3 progressive levels (10 CP each) unlocking advanced ship types and technologies. Cannot be researched until a player actually builds a Ship Size 4+ ship. Levels must be purchased in order. Each level opens new units and upgrades (see sub-options AC 1/2/3). \"Advanced\" means a non-advanced unit may be upgraded; \"X\" at the end means a non-advanced unit may NOT be upgraded to that type."

[resource_cards]
name = "Resource Cards"
ref = ["AGT MRB 39.0 p.37", "SE4X 3 VO 6.0 p.8"]
category = "optional"
default = false
source = "r"
description = "Each player gets their own deck of Resource Cards (split equally). Draw 3 at game start, then 1 per Economic Phase (max 6 in hand). Each card can be played for its Event OR discarded for its CP value. Events are played in reverse turn order. 4 Cancel Cards in the deck can negate other cards. Mission Cards require completing an objective on the map for a reward (rolled on a table). Cards add flavor, unpredictability, and strategic choices to each Economic Phase."

[replicators]
name = "Replicators"
ref = ["AGT MRB 40.0 p.39", "SE4X 3 VO 7.0 p.13"]
category = "optional"
default = false
source = "r"
incompatible = ["empire_advantages_balanced", "facilities", "terraforming_nebulae", "unique_ships", "ship_experience", "reaction_movement", "galactic_capitol", "space_amoebas", "blood_brothers"]
description = "One player plays as self-replicating Von-Neumann Machines with completely different mechanics. Replicators have their own Empire Advantages, Production Sheet, and ship types. They do not collect income or use CP — instead, Colonies at Full growth produce ships directly. Colony Depletion occurs each Economic Phase (closest Full Colony is consumed). Research is via Research Points (RP, max 15) earned through encounters, not purchased. Ship technology (Attack, Defense, Move) scales with RP accumulated. Cannot use Colony Ships, Bases, Starbases, DSNs, Shipyards, or MS Pipelines."

[unique_ships]
name = "Unique Ships"
ref = ["AGT MRB 41.0 p.43", "SE4X 2 VO 19.0 p.10"]
category = "optional"
default = false
source = "ce"
incompatible = ["replicators"]
description = "Each player designs a custom ship before the game starts (6 identical counters). The design sets Weapon Class, Attack, Defense, and Hull Size from cost tables. Up to 2 special abilities may be added (same ability cannot be chosen twice). Min cost 5 CP (9 CP if carrying Exploration). Ship Size technology determines the max CP cost. The design may be changed anytime (costs 5 CP, no Unique Ships currently built). All Unique Ships get the React ability at Move 5."

# =============================================================================
# FACILITIES (sub-options of 36.0)
# =============================================================================

[industrial_centers]
name = "Industrial Centers (IC)"
ref = ["AGT MRB 36.3 p.32", "SE4X 2 VO 17.0 p.10"]
category = "facility"
default = false
source = "ce"
requires = ["facilities"]
description = "Each IC provides 5 CP per Economic Phase. This CP may be accumulated and used like any other CP. ICs do not allow players to exceed the 30 CP carry-over limitation per Economic Phase. When a Colony with an IC generates income, the entire amount is CP (the Homeworld always produces 20 CP plus whatever its Facilities generate). Income from MS Pipelines and Minerals is always CP regardless of Facilities present."

[research_centers]
name = "Research Centers (RC)"
ref = ["AGT MRB 36.4 p.32", "SE4X 2 VO 17.0 p.10"]
category = "facility"
default = false
source = "ce"
requires = ["facilities"]
description = "Each RC provides 5 Research Points (RP) per Economic Phase, tracked on the Production Sheet. Only RP can be used to purchase technology (not CP). CP cannot be converted to RP. Up to 30 RP can be carried over between Economic Phases. This forces players to plan research spending more deliberately, since technology can only come from RC output. Homeworlds start with 1 RC, producing 20 CP + 5 RP on the first Economic Phase."

[logistic_centers]
name = "Logistic Centers (LC)"
ref = ["AGT MRB 36.5 p.33"]
category = "facility"
default = false
source = "agt"
requires = ["facilities"]
description = "Each LC provides 5 Logistic Points (LP) per Economic Phase. LP is used instead of CP to pay maintenance. Ships must be within Supply Range (determined by Supply Range technology) of a friendly Colony to receive supply. Out of Supply Groups: pay no maintenance, move only 1 hex per turn, suffer -3 Attack and -3 Defense (min 0/1). LP is also converted to groups of 5 placed on the board as supply counters. Transports can carry up to 30 LP. LP can be converted from CP at 3:1 if LP runs short."

[temporal_centers]
name = "Temporal Centers (TC)"
ref = ["AGT MRB 36.6 p.33"]
category = "facility"
default = false
source = "agt"
requires = ["facilities"]
description = "Each TC provides 5 Temporal Points (TP) per Economic Phase. TP is spent to activate effects from the Temporal Effect Table (p.46) via Temporal Engines installed on Bases, Advanced Bases, Starbases, and Shipyards. At game start, one random ship type also carries Temporal Engines. Effects include extra movement, combat bonuses, rerouting targeting, and more. Each effect can be used on a specific ship only once per turn, but multiple effects may be stacked. No limit on TP carry-over between rounds."

# =============================================================================
# ADVANCED CONSTRUCTION (sub-options of 38.0)
# =============================================================================

[advanced_construction_1]
name = "Advanced Construction 1"
ref = ["AGT MRB 38.1.1 p.35", "SE4X 3 VO 4.0 p.5"]
category = "advanced_construction"
default = false
source = "r"
requires = ["advanced_construction"]
description = "Costs 10 CP. Unlocks: DestroyerX (DDX, upgraded DD with +1 Attack/Defense and Heavy Warheads), Advanced Bases (Bases with Exploration 2 and Scanners, buildable at any MS Pipeline hex even without a planet), Tractor Beams (mountable on any ship, independent research), Shield Projectors (mountable on any ship, independent research), Attack 4 on Titans and Starbases only (requires Attack 3 first)."

[advanced_construction_2]
name = "Advanced Construction 2"
ref = ["AGT MRB 38.1.2 p.36"]
category = "advanced_construction"
default = false
source = "agt"
requires = ["advanced_construction", "advanced_construction_1"]
description = "Costs 10 CP. Unlocks: Starbases (A7-3-x4, 2 attacks/round, upgradable from Advanced Bases for 12 CP, mount Attack 4 and Exploration 2 automatically, cannot move), Cyber Armor (counts as 3 Grav Armor in ground combat), Battle Carriers (BV, carry 6 Fighters, treated as CVs, can get Fast 2), Fighter 4 (Fighter tech upgrade), and 4 MinerX counters (Miners that auto-upgrade Move and Terraforming tech, not limited to Move 1)."

[advanced_construction_3]
name = "Advanced Construction 3"
ref = ["AGT MRB 38.1.3 p.36"]
category = "advanced_construction"
default = false
source = "agt"
requires = ["advanced_construction", "advanced_construction_2"]
description = "Costs 10 CP. Unlocks: RaiderX (RX, upgraded Raider with +1 Attack/Defense, Fast 2, can carry 1 Ground Unit and serve as Drop Ship), ScoutX (SCX, Group #7 with Movement 3 levels above current tech, up to Move 7, acts as a fast Scout), and Advanced Flagship (upgrade cost 3 CP, gains all current tech levels, may pick one special ability from the Unique Ship Table)."

# =============================================================================
# VARIANTS — from AGT CSB (Competitive Scenario Book)
# =============================================================================

[sinister_victory]
name = "\"Sinister\" Victory Condition"
ref = ["AGT CSB 1.1.9 p.4"]
category = "variant"
default = false
source = "agt"
description = "A player wins by eliminating the Homeworld of the player on their left (not any opponent). This creates two fronts per player (one offensive, one defensive) and reduces the likelihood of two players ganging up on a third."

[simultaneous_play]
name = "Simultaneous Play"
ref = ["AGT CSB 1.1.10 p.4"]
category = "variant"
default = false
source = "agt"
description = "Experienced players conduct their turns simultaneously. Players only wait for each other when there is direct interaction (combat, same hex) or to keep everyone in the same Economic Phase. Switch to sequential turns when only two rows of unexplored Deep Space remain between players."

[quick_start_agt]
name = "Quick Start (AGT)"
ref = ["AGT CSB 1.1.11 p.4"]
category = "variant"
default = false
source = "agt"
description = "After setting up, flip all Home System markers and place a full-strength Colony on all non-barren planets. Players do not start with any Colony Ships. 10 CP planets grow to 5 CP like any other Colony, then to 10 CP the following phase (place a flipped Colony Ship on top until 10 CP is reached)."

[handicap_rule]
name = "Handicap Rule"
ref = ["AGT CSB 1.1.12 p.4"]
category = "variant"
default = false
source = "agt"
description = "Gives a less-experienced player a small advantage by increasing their CP income during the early game. During each Economic Phase, the income of that player's Colonies increases by two steps (e.g., a Colony Ship becomes a \"1 Colony\" with a \"3 Colony\" marker on top)."

[variable_balanced_home_systems]
name = "Variable but Balanced Home Systems"
ref = ["AGT CSB 1.1.13 p.4"]
category = "variant"
default = false
source = "agt"
description = "All players set aside specific markers from their Home Systems and from a pool of new \"v\" markers. These are organized into 14 stacks of one counter type per player. Players collectively choose 6 stacks randomly and blindly, then each takes their 6 markers and shuffles them into their Home System markers before setup. All players have the same composition but no one knows which specific markers are in play."

[uneasy_alliance]
name = "Uneasy Alliance"
ref = ["AGT CSB 1.3.1 p.4"]
category = "variant"
default = false
source = "agt"
description = "Team variant. Teammates may never stack units in the same hex and may not use each other's MS Pipelines. Teammates may not capture each other's Colonies with Ground Units (21.0) or use Boarding Ships (19.0) on allies. Teammates win or lose together."

[blood_brothers]
name = "Blood Brothers"
ref = ["AGT CSB 1.3.2 p.4"]
category = "variant"
default = false
source = "agt"
incompatible = ["replicators"]
description = "Team variant. Teammates execute their turns at the same time. They may stack together, attack together, and use each other's MS Pipelines for movement. However, they may not share research or CPs. Allies may never bombard Colonies originally colonized by their teammate. Teammates win or lose together."

[space_amoebas]
name = "Space Amoebas"
ref = ["AGT CSB 10.0 p.16"]
category = "variant"
default = false
source = "agt"
incompatible = ["replicators"]
description = "Giant Space Amoebas are pre-placed in Deep Space between Home Systems. They multiply and attack human players during the game. Unlike the solo scenario, no rule restrictions apply (Titans, Ground Combat, Facilities, etc. can all be used). Players must pay maintenance as usual. Minesweepers double as Science Vessels (SV) to research Amoebas: each SV in an Amoeba hex rolls a die for Research Points. After 10 RP total, a player rolls on the Amoeba Strength Table to determine the Amoeba type for the entire game."

# =============================================================================
# DEPRECATED VARIANTS — absent from all AGT documents
# These were in older rulebooks and not carried over to All Good Things.
# =============================================================================

[variant_quick_start]
name = "Quick Start Variant"
ref = ["SE4X 1 SB p.7"]
category = "deprecated"
default = false
source = "base"
description = "After set up, all System markers of the player's color are flipped and all non-barren planets have a full-strength Colony placed on them. The player does not start with any Colony Ships."

[variant_ship_build_requirement]
name = "Ship Build Requirement Variant"
ref = ["SE4X 1 SB p.7"]
category = "deprecated"
default = false
source = "base"
description = "Players may not research Fighter Technology until a BC, BB, or DN from either side has been in combat with another player (not aliens). Players may not research Cloaking until a DD or larger ship from either side has been in combat with another player. Once the condition is met, all players may research the technology."

[variant_low_maintenance]
name = "Low Maintenance Game Variant"
ref = ["SE4X 1 SB p.7"]
category = "deprecated"
default = false
source = "base"
description = "All maintenance costs are halved (round down). When calculating maintenance, add up the total you would normally pay, then divide by 2. Encourages building ships early, attacking early, and fielding larger fleets."

[variant_heavy_terrain]
name = "Heavy Terrain Game Variant"
ref = ["SE4X 1 SB p.7"]
category = "deprecated"
default = true
source = "base"
description = "When a \"Danger!\" or \"Lost in Space\" counter is flipped, the hex is not left empty. Instead, a new Deep Space System marker is drawn from the unused ones and placed face down in the hex. Once all markers are used, the space is left empty. If the marker was flipped by scanning, the new marker may be explored but not scanned again that turn."

[variant_variable_3_player_map]
name = "Variable 3-Player Map"
ref = ["SE4X 1 SB p.6"]
category = "deprecated"
default = false
source = "base"
description = "All Home System and Deep Space markers are mixed together and randomly placed across the entire map. Players place their home planets randomly using a D20. This often leads to unbalanced maps, but diplomacy and alliances become part of the challenge: weaker positions can gang up on stronger ones."

[variant_more_aliens]
name = "More Aliens"
ref = ["SE4X 2 VO 20.0 p.11"]
category = "deprecated"
default = false
source = "ce"
requires = ["aliens_npa"]
description = "The Barren Planet in each player's Home System has aliens, as if it were a Deep Space barren planet. An Alien Technology Card is gained from colonizing it."

[variant_safer_space]
name = "Safer Space"
ref = ["SE4X 2 VO 20.0 p.11"]
category = "deprecated"
default = false
source = "ce"
description = "Whenever a \"Danger!\" marker is flipped, one die is rolled for all exploring ships. Ships are only eliminated on a roll of 9-10 (instead of the normal rules). On 1-8, there is no effect."

[variant_rich_minerals]
name = "Rich Minerals"
ref = ["SE4X 2 VO 20.0 p.11"]
category = "deprecated"
default = false
source = "ce"
description = "The income from all Mineral counters is doubled."

[variant_slow_scientists]
name = "Slow Scientists"
ref = ["SE4X 2 VO 20.0 p.11"]
category = "deprecated"
default = false
source = "ce"
description = "The research cost of all technologies is increased by 5 CP."

[variant_smart_scientists]
name = "Smart Scientists"
ref = ["SE4X 2 VO 20.0 p.11"]
category = "deprecated"
default = false
source = "ce"
description = "The research cost of all technologies is decreased by 5 CP."

[variant_bloody_combat]
name = "Bloody Combat"
ref = ["SE4X 2 VO 20.0 p.11"]
category = "deprecated"
default = false
source = "ce"
description = "All units have their Attack Strength increased by 1."

[variant_rich_colonies]
name = "Rich Colonies"
ref = ["SE4X 2 VO 20.0 p.11"]
category = "deprecated"
default = false
source = "ce"
description = "All Colonies (including Home planets) that would normally produce at least 1 CP have their income increased by 3 CP. In the case of ground combat, Militia still only equal the face value of the Colony's CP."

[variant_head_start]
name = "Head Start"
ref = ["SE4X 2 VO 20.0 p.11"]
category = "deprecated"
default = true
source = "ce"
description = "Each player starts the game with 75 CP (or some agreed amount) to spend only on technology before receiving starting units. No more than 2 levels of Ship Size or Move technology and no more than 1 level of any other technology may be purchased. Up to 10 CP may be carried over as normal CP into the game."
