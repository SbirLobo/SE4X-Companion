[[empire_advantage]]
number = 31
name = "Fearless Race"
text = """The ethos of this race places a high value on proving their courage. All of their combat-capable ships and Shipyards (excluding Boarding Ships and Ground Units) fire as A-Class ships in the first round of combat (only). Their Missiles hit as C-Class in the first round. After the first round everything reverts to its normal Class. However, none of their ships are able to retreat from combat until after Round 3 (this may be modified by e.g. Crew Cards). Their ships would still fire as E-Class (or F-Class for Boarding Ships) when in Asteroids or Nebulae (5.8)."""
highlighted = ["Their Missiles hit as C-Class in the first round."]
reveal = "When first entering any combat, including Aliens."

[[empire_advantage]]
number = 32
name = "Warrior Race"
text = """+1 to Attack Strength for all non-Boarding Ship units when they are the attacker in a battle. –1 to the Attack Strength for all non-Boarding Ship units when they are the defender in a battle. No advantage is given when bombarding a planet or to ground troops."""
highlighted = []
reveal = "When first entering any combat, including Aliens."

[[empire_advantage]]
number = 33
name = "Celestial Knights"
text = """Once per space battle (not ground combat or Colony bombardment), after the first round, at the start of a round, this race may declare a "charge". All of their units (including Boarding Ships and Missile Boats but not any kind of Bases, DSN, Ion Cannons and Shipyards) get two attacks (or fire two missiles) in that round only. However, in all following rounds all enemy units get +1 to their Attack Strength (this does not apply to fire against Missiles, but does apply against any kind of Bases, DSN, and Shipyards). In addition, the charging ships may not retreat the round after the charge."""
highlighted = ["and Missile Boats", "DSN, Ion Cannons", "(or fire two missiles)", "(this does not apply to fire against Missiles, but does apply against any kind of Bases, DSN, and Shipyards)"]
reveal = "When a \"charge\" is declared for the first time."

[[empire_advantage]]
number = 34
name = "Giant Race"
text = """The Hull Size of all units (except Ground Units and Missiles) of this race is increased by one. This impacts everything that has to do with Hull Size – SYs needed to construct (including for Miners, Colony Ships, and MS Pipelines), damage to destroy, technology that can be carried, maintenance, boarding parties, etc. The cost to build the ships remains the same. Captured ships of this race retain their Hull Size. Giant Race may not research Fighters and may not get them by any other means (capturing technology, etc.). Decoys continue to have a Hull Size of zero and do not need a SY to build. Missiles still only take 1 hit to destroy"""
highlighted = ["Missiles still only take 1 hit to destroy"]
reveal = "When first entering any combat, including Aliens."

[[empire_advantage]]
number = 35
name = "Industrious Race"
text = """When this race researches Terraforming 1, they may colonize Asteroids exactly as if they were a Barren Planet. The Asteroids still retain their normal terrain effects. Titans may not destroy an Asteroid like it would a planet and may not attack Asteroid Colonies at all. Other players may not attack an Asteroid Colony with Ground Units. If playing with the Short Game Victory Condition (Colony Points; CSB 1.1.7), Asteroid Colonies in Deep Space do not count as a Colony Point. If colonizing an Asteroid, the player does NOT get an Alien Technology Card (11.0)."""
highlighted = []
reveal = "When an asteroid is colonized for the first time."

[[empire_advantage]]
number = 36
name = "Ancient Race"
text = """At the start of the game (before it begins), this player reveals that they are the Ancient Race, then explores all hexes adjacent to their Homeworld. They then explore six of the hexes that are adjacent to those hexes (these will be two hexes from their Homeworld). This means that it is possible for some of the hexes that are two spaces away from their Homeworld to not be explored (depending on the setup). They immediately collect up to 3 Minerals that were revealed and place those Minerals on their Homeworld. Next, this player places up to 3 Colony Ships from their supply (Colony Ship side up) on any non-barren planets that are revealed in this way (3 Colony Ships still start at the Homeworld). They will become Colony 1s at the end of the first Economic Phase. This represents colonists that have made contact with this player's race again after spending hundreds of years in cryogenic sleep while in transit to these planets. Now that the "modern" faster than light drive has been perfected, the Colonies will grow and become part of the Empire."""
highlighted = []
reveal = "At the start of the game."

[[empire_advantage]]
number = 37
name = "Space Pilgrims"
text = """This race has a greater understanding of space and is at home in it. They suffer no movement penalties in Nebulae or Asteroids. Their ships never get sucked into Black Holes and they are never Lost in Space. They may even use the Black Hole Slingshot optional rule automatically, without having to roll for destruction. They still are destroyed by Danger! markers and other terrain still affects them."""
highlighted = []
reveal = "When entering a Black Hole or Lost in Space marker or if they ignore the movement penalty of an Asteroid or Nebula. In order to keep their advantage secret, they may choose to roll when entering a Black Hole hex."

[[empire_advantage]]
number = 38
name = "Hive Mind"
text = """This race learns and adapts in each battle. Starting in round 2 of a battle, all of this race's units get +1 to their Defense Strength. Starting in round 4, all units also get +1 to their Attack Strength. Starting in round 6, all units get +1 to their Hull Size. These same modifiers also apply to ground combat, but the ground combat is considered to have started with round 1 even if a space battle preceded it. If the attacker does not get to fire in the first round of ground combat (because of not having Drop Ships), that still counts as the first round of combat. They do not get these benefits while bombarding planets. Missiles receive the attack and defense strength benefits, but not the hull size benefit."""
highlighted = ["Missiles receive the attack and defense strength benefits, but not the hull size benefit."]
reveal = "When first entering any combat, including Aliens."

[[empire_advantage]]
number = 39
name = "Nano-technology"
text = """This race's units may instantly upgrade to the newest technology for free regardless of location. If they do so they must not move that turn."""
highlighted = []
reveal = "At the end of the game."

[[empire_advantage]]
number = 40
name = "Quick Learners"
text = """These start with Military Academy level 1 and roll 2 dice (taking the best result) when checking to see if a ship increases in Experience. Other Empires may NEVER gain Military Academy technology from this race."""
highlighted = []
reveal = "When rolling to see if a ship gains Experience."

[[empire_advantage]]
number = 41
name = "Gifted Scientists"
text = """This highly technological race gets a 33% discount (rounded up and applied before any other discounts) when researching any technology. However, every unit they build (Colony Ship, Decoy, Scout, Pipeline, etc.) costs 1 CP more."""
highlighted = []
reveal = "At the end of the game."

[[empire_advantage]]
number = 42
name = "Master Engineers"
text = """This race uses a highly advanced, but unstable form of faster-than-light drive. This empire starts the game with Move 2 and Fast 1 technologies. In addition, each full-strength colony can produce and retrofit ships as if it had 1 SY present. This may be combined with actual SY that are built.
EXAMPLE: A Full Strength Colony without an SY and with SY Tech 3 could produce a BC."""
highlighted = ["This empire starts the game with Move 2 and Fast 1 technologies."]
reveal = "At the end of the game."

[[empire_advantage]]
number = 43
name = "Insectoids"
text = """This race reproduces and builds very rapidly. The Hull Size of all units (except Ground Units and Missiles) of this race is decreased by one. Except as noted, this impacts everything that has to do with Hull Size – SYs needed to construct (including for Miners, Colony Ships, and MS pipelines), damage to destroy, tech that can be carried, maintenance, boarding parties, etc. The cost to build the ships remains the same. A ship such as a DD, which has a Hull Size of 0, would pay no maintenance, not be allowed to carry any attack or defense tech, and could upgrade technology at a SY for no CP cost. A ship with a Hull Size of 0 would still be destroyed by 1 hit and would be considered to have a Hull Size of 1 for the purpose of any Experience roll. Ships with a Hull Size of 0 are considered to have a Hull Size of 1/2 for the purpose of using Shipyard capacity. For example: 1 Shipyard at Shipyard Tech 2 could build 3 DDs in an Economic Phase. Insectoids may not research Military Academies or Fighters and may not get them by any means (capturing technology, etc.). Captured ships of this race retain their Hull Size. Insectoid Starbases may still mount Attack 4."""
highlighted = ["Insectoid Starbases may still mount Attack 4."]
reveal = "When first entering any combat, including Aliens."

[[empire_advantage]]
number = 44
name = "Immortals"
text = """This race reproduces very slowly, but never dies of old age. They have developed extra shielding and a system of reserve power in an attempt to preserve the lives of their people. One time in each round of combat, this race may choose to ignore one point of damage. This means that it is impossible for one of their ships to be destroyed in a one-on-one battle (unless the other ship is a Titan or Missile Boat or uses Resource Cards). An Alternate Empire player cannot ignore a hit against one of their Missiles. However, because a large seed population is needed for their Colonies, each Colony Ship costs 2 CP more. They may not choose to ignore a boarding hit. Captured ships retain this ability. However, only a hit on the captured ship(s) can be ignored. Immortals may not research Boarding and may not get it by any means (capturing technology, etc.). If playing with any rule that normally would allow a player to carry CP over into the start of the game (like the Technology Head Start Scenario Modifier), the Immortals may not and will lose any CP not spent on research. Immortals cannot use their special ability against Bombardment Damage or during Ground Combat."""
highlighted = ["unless the other ship is a Titan or Missile Boat or uses Resource Cards", "like the Technology Head Start Scenario Modifier"]
reveal = "When they first choose to ignore 1 hit in combat."

[[empire_advantage]]
number = 45
name = "Expert Tacticians"
text = """This race of superior tacticians gets the +1 Attack Fleet Size Bonus as soon as they have one more combat-capable ship in a battle than their opponent (they don't need to have a 2:1 advantage). In addition, opponents do not get the Fleet Size Bonus against them unless they outnumber them by 3:1. If the opposing fleet has Agent Smith or has an Admiral Of The Navy (or any combination thereof), everything cancels each other out and the Fleet Size Bonus is given at 2:1."""
highlighted = []
reveal = "When they first choose to use their improved Fleet Size Bonuses in combat."

[[empire_advantage]]
number = 46
name = "Horsemen of the Plains"
text = """This race developed from a culture that valued the ability to strike quickly and evade. If a ship of this race could otherwise retreat, it may do so at the end of a round of combat, even if it fired during that round. It does not need to wait for its turn to fire to retreat. They could retreat as early as the end of Round 1, before Round 2 begins. In addition, all of this player's ships always get +2 to their Attack Strength when firing on a planet."""
highlighted = []
reveal = "When they first use one of their abilities."

[[empire_advantage]]
number = 47
name = "And We Still Carry Swords"
text = """This race loves physical combat. This race starts with Ground Combat 2. All of their boarding attacks get +1 to their Attack Strength and all boarding attacks against them get -1 to their Attack Strength. In addition, all of their Ground Units, including Militia, get +1 to their Attack and Defense Strength (whether attacking or defending). Other Empires may NEVER gain Ground Combat tech from this race."""
highlighted = []
reveal = "When engaging in boarding attack or ground invasion for the first time."

[[empire_advantage]]
number = 48
name = "Amazing Diplomats"
text = """Non-Player Aliens do not attack this race and this race may both move through their System and stack with them. NPAs with the Aggressive trait do not attack them. While the alien ships will not leave the System, they will defend against attacks from other players. This player may colonize alien planets as if the aliens were not there (and gain an Alien Technology card). This represents them developing a relationship, trade, and an outpost on that planet. A Colony on an alien planet is treated like a player's Colony in every respect. If the alien ships are subsequently destroyed by another player, the Colony still continues until destroyed normally."""
highlighted = []
reveal = "When entering a NPA hex for the first time or if Aggressive NPA would attack them."

[[empire_advantage]]
number = 49
name = "Traders"
text = """Gets one extra CP for each colony connected by an MS Pipeline."""
highlighted = []
reveal = "At the end of the game."

[[empire_advantage]]
number = 50
name = "Cloaking Geniuses"
text = """After researching Cloaking 1, all of their Scouts and Destroyers also get the benefit of Cloaking. After researching Cloaking level 2, all of their Cruisers also get the benefit of Cloaking. If not nullified by scanners the SCs, DDs & CAs do get the +1 to their Attack Strength during the first firing round. If nullified by Scanners, these ships fire where they normally would according to their Weapon Class rating (a CA would fire as C-Class). This is not an instant upgrade. Any ships already produced would have to be refitted. A note will need to be made on existing Groups in the margin of the Ship Technology Sheet. Captured ships of this race retain their Cloaking ability (and can be upgraded)."""
highlighted = []
reveal = "When a cloaked SC/DD/CA is encountered in combat or moves through an enemy ship."

[[empire_advantage]]
number = 51
name = "Star Wolves"
text = """Each of this race's SCs, DDs, and Fighters get +1 to their Attack Strength when firing on a unit with a Hull Size of 2 or greater. In addition, their DDs cost 1 less (8 CP for Base Empires, or 9 CP for Alternate Empires)."""
highlighted = ["(8 CP for Base Empires, or 9 CP for Alternate Empires)."]
reveal = "When they first use their ability."

[[empire_advantage]]
number = 52
name = "Power to the People"
text = """Mines, Colony Ships, Miners, and MS Pipelines are automatically and instantly upgraded to the player's current Movement technology (they will be able to move more than 1 space per turn)."""
highlighted = []
reveal = "When a Miner, CO, MS Pipeline, or revealed Mine moves faster than normal for the first time."

[[empire_advantage]]
number = 53
name = "House of Speed"
text = """This race starts with Movement 7 tech, but their ships sacrifice defensive abilities. Opponents (including NPAs, Doomsday Machines, Space Amoebas, and Space Pirates) get a +2 to their Attack Strength (even when boarding) when firing at ships of this race (including Fighters, but not any type of Bases, SYs, DSN, Colonies, Space Stations, or Ground Units)."""
highlighted = []
reveal = ""

[[empire_advantage]]
number = 54
name = "Powerful Psychics"
text = """This race starts with Exploration 1 technology. In addition, their sensors are more advanced. This player may reveal all face down Groups that are adjacent to one of their ships with Exploration technology (e.g. CAs, Flagship, Unique ships). These counters are left face up (as if they had been encountered in combat). However, the technology on the revealed ships is not revealed by this power. Since their Exploration technology is partially based on their psychic powers, other Empires may NEVER gain Exploration technology from this race (either by scrapping boarded ships or capturing planets)."""
highlighted = []
reveal = "The first time a stack is inspected."

[[empire_advantage]]
number = 55
name = "Shape Shifters"
text = """This Empire may place Decoys in any hex with a friendly combat ship in addition to any hex with a Colony. Each Economic Phase they get two free Decoy units. If they run out of Decoys, they may use any spare counter as a Decoy if they mark it as such on their Ship Tech sheet.
EXAMPLE: CA #2 can be marked as a Decoy on the Ship Tech Sheet and used as a Decoy.
In combat, they do not have to reveal any technology possessed unless it actually would change the result of a combat roll, in which case they announce it after the roll.
EXAMPLE: A CA Group has Attack 2 Tech. This is not revealed. After rolling an Attack, one of the dice misses by one. The player then must reveal that he has Attack 2 and it scores a hit.
Once per game, they may retreat their ships as if they had just played Resource Card #107 Retreat While Engaged."""
highlighted = ["played Resource Card #107 Retreat While Engaged."]
reveal = "When a non-Decoy effect of this card is used."

[[empire_advantage]]
number = 58
name = "On the Move"
text = """Shipyards and all types of Bases have Move 1 and may attack and explore. They may not retreat from combat, and they can never be upgraded to a higher Movement technology. They may move an extra hex if using MS Pipelines or Black Hole Slingshot. Shipyards may only build ships during the Economic Phase if they are in the same hex with a friendly Colony that produced CP during this Economic Phase. However, they may be used to upgrade ships normally no matter where they are on the map. Both the SY and group being upgraded may not move when performing the retrofit. All other rules for Shipyards and Bases are the same."""
highlighted = []
reveal = "The first time a revealed Shipyard/Base moves, the first time a Shipyard or a (non advanced) Base is revealed while not at a Colony, or the first time a Shipyard/Base is in battle."

[[empire_advantage]]
number = 59
name = "Longbowmen"
text = """This race uses long range torpedoes. The Weapon Class of their SC, DD, CA, BC, Flagship, Missiles, and nullified Raiders is increased by one letter (C-Class becomes B-Class, B-Class becomes A-Class, etc.). A-Class ships remain A-Class and get no benefit. This benefit is only if the battle is in open space, Space Stations, planets, Minerals, or Space Wrecks. DDs with Long Lance Torpedoes and Fighters stay at B-Class and get no benefit."""
highlighted = ["SC, DD, CA, BC, Flagship, Missiles, and nullified Raiders"]
reveal = "When first entering combat, including Aliens, with one of the affected ships."

[[empire_advantage]]
number = 187
name = "War Sun"
text = """This race has spent generations refitting an ancient warship, and it is nearly operational. Once during the game, they gain a free Titan at their Homeworld. It will have the player's current tech and requires no Shipyard to place. It pays no maintenance as long as it is at a friendly Colony during the Econ Phase. This ship may not enter Deep Space until Ship Size 6 has been researched. Additionally, the War Sun has revealed to this race the ability to pass safely through Super Nova hexes (though they cannot end their movement in one). Alternate Empires (24.0) are given one Titan counter. This is the only time an Alternate Empire can have a Titan; they may still not research or build other Titans and they may not rebuild this one if destroyed."""
highlighted = ["This ship may not enter Deep Space until Ship Size 6 has been researched."]
reveal = "When any of their Titan counters are revealed."

[[empire_advantage]]
number = 188
name = "Salvage Experts"
text = """When this race wins a space battle, they may salvage one friendly destroyed combat ship (not Shipyards, Bases, Mines, Starbases, Defense Satellite Networks, or Flagships). The salvaged ship is placed face down in the hex at its previous Ship Experience level. Ships that were carrying other units or Logistic Points when they were destroyed do not regain them when the ship is salvaged. If none of their ships are destroyed no ship is gained, but if the enemy lost at least one combat ship, this empire gains 3 CP."""
highlighted = []
reveal = "When first entering combat, including Aliens."

[[empire_advantage]]
number = 189
name = "Berserker Genome"
text = """At the end of every combat round of space combat in which this race loses a unit, they may make a special attack for each unit destroyed (units hit by boarding attacks do not count as destroyed for this purpose). These bonus attacks hit on a roll of 1+the Hull Size of the destroyed unit, regardless of the target's defense and does one damage (example: a destroyed BC gets a final attack hitting on 1-3)."""
highlighted = []
reveal = "When first used."

[[empire_advantage]]
number = 190
name = "Robot Race"
text = """Due to the low maintenance of this race, all maintenance is halved; add up all maintenance costs (including reductions from alien technology cards and experience), divide the total in half and round down."""
highlighted = []
reveal = "At the end of the game."

[[empire_advantage]]
number = 191
name = "Masters of the Gates"
text = """All CAs have Warp Gates without any research and at no extra cost. Rules as per UN Ship Table #3."""
highlighted = []
reveal = "The first time a Warp Gate is used or a CA is in combat."

